name: Collect data
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:
concurrency:
  group: collect-data
  cancel-in-progress: false
jobs:
  create:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      # Install pipenv BEFORE setup-python so that `cache: 'pipenv'` can find it
      # (pipx is preinstalled on GitHub-hosted runners).
      - name: Install pipenv
        run: pipx install pipenv
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11.5'
          cache: 'pipenv'
      - name: collect
        run: pipenv install && pipenv run python main.py
      - name: Commit new data
        run: |
          git config --global user.name 'Collect Bot'
          git config --global user.email 'noreply@nedora.digital'
          git add .
          git diff --staged --quiet || git commit -m "Add data for today"
          git pull -r
          git push
